version: "3.9"

services:
  api:
    build: .
    container_name: sekker_api
    ports:
      - "8088:8088"
    # Carga variables desde .env (SECRET_KEY, ALGORITHM, USER, PASSWORD)
    env_file:
      - .env
    # Mantén data_img persistente en el host
    volumes:
      - ./data_img:/app/data_img
    restart: unless-stopped
